name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Run checks
        run: vp check

      - name: Run tests
        run: vp test

      - name: Run build
        run: vp run build
